<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Visualiseur 3D - TPE Maquette</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #f0f2f5; font-family: sans-serif; }
        #message {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            text-align: center; color: #64748b; pointer-events: none;
        }
        .loader {
            border: 4px solid #e2e8f0; border-top: 4px solid #3b82f6; border-radius: 50%;
            width: 30px; height: 30px; animation: spin 1s linear infinite; margin: 0 auto 10px;
        }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        #info {
            position: absolute; bottom: 20px; left: 20px;
            background: rgba(255,255,255,0.9); padding: 15px; border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1); font-size: 14px; display: none;
        }
        .legend-item { display: flex; align-items: center; margin-bottom: 5px; }
        .dot { width: 12px; height: 12px; border-radius: 50%; margin-right: 8px; }
    </style>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>

    <div id="message">
        <div style="font-size: 40px; margin-bottom: 15px;">🏢</div>
        <div style="font-size: 18px;">Glissez votre fichier <b>maquette_finale.stl</b> ici</div>
    </div>

    <div id="info">
        <div style="font-weight: bold; margin-bottom: 10px;">Légende</div>
        <div class="legend-item"><div class="dot" style="background:#ff5252"></div> Bâtiments (> 5mm)</div>
        <div class="legend-item"><div class="dot" style="background:#37474f"></div> Routes (2.5 - 5mm)</div>
        <div class="legend-item"><div class="dot" style="background:#cfd8dc"></div> Base (< 2.5mm)</div>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { STLLoader } from 'three/addons/loaders/STLLoader.js';

        let scene, camera, renderer, controls, mesh;

        // --- CONFIGURATION DES COULEURS ---
        const COL_BASE = new THREE.Color(0xcfd8dc);      // Gris clair
        const COL_ROUTE = new THREE.Color(0x37474f);     // Gris foncé (Bitume)
        const COL_BATIMENT = new THREE.Color(0xff5252);  // Rouge (Immeubles)

        // Seuils de hauteur (en mm, correspondant à ta config Python)
        const SEUIL_ROUTE = 2.6;    // Un peu au-dessus de la base (2.5mm)
        const SEUIL_BATIMENT = 5.1; // Un peu au-dessus des routes (2.5 + 2.5 = 5mm)

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0xf0f2f5);
            scene.fog = new THREE.Fog(0xf0f2f5, 100, 1000);

            // Lumières
            const hemiLight = new THREE.HemisphereLight(0xffffff, 0x444444, 0.8);
            scene.add(hemiLight);
            const dirLight = new THREE.DirectionalLight(0xffffff, 1);
            dirLight.position.set(50, 100, 50);
            dirLight.castShadow = true;
            scene.add(dirLight);

            // Rendu
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            document.body.appendChild(renderer.domElement);

            // Caméra
            camera = new THREE.PerspectiveCamera(45, window.innerWidth/window.innerHeight, 1, 5000);
            camera.position.set(100, 100, 100);

            // Contrôles
            controls = new OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.autoRotate = false;

            window.addEventListener('resize', onResize);
            
            // Drag & Drop events
            window.addEventListener('dragover', e => e.preventDefault());
            window.addEventListener('drop', onDrop);
            
            animate();
        }

        function onDrop(e) {
            e.preventDefault();
            const file = e.dataTransfer.files[0];
            if(file) loadSTL(file);
        }

        function loadSTL(file) {
            const loader = new STLLoader();
            document.getElementById('message').innerHTML = '<div class="loader"></div><div>Traitement...</div>';

            const reader = new FileReader();
            reader.onload = function(event) {
                const geometry = loader.parse(event.target.result);
                
                // 1. Analyse des hauteurs
                geometry.computeBoundingBox();
                const minZ = geometry.boundingBox.min.z;

                // 2. Coloration par vertex (Sommets)
                const count = geometry.attributes.position.count;
                const colors = [];
                const positions = geometry.attributes.position.array;

                for (let i = 0; i < count; i++) {
                    // On récupère la hauteur Z du point
                    // (Attention : STL est souvent Z-up, mais ThreeJS est Y-up. 
                    // Ici on analyse la géométrie brute avant rotation)
                    const z = positions[i * 3 + 2]; 
                    const height = z - minZ; // Hauteur relative depuis le bas du modèle

                    if (height > SEUIL_BATIMENT) {
                        colors.push(COL_BATIMENT.r, COL_BATIMENT.g, COL_BATIMENT.b);
                    } else if (height > SEUIL_ROUTE) {
                        colors.push(COL_ROUTE.r, COL_ROUTE.g, COL_ROUTE.b);
                    } else {
                        colors.push(COL_BASE.r, COL_BASE.g, COL_BASE.b);
                    }
                }

                geometry.setAttribute('color', new THREE.Float32BufferAttribute(colors, 3));
                geometry.center(); // Centre l'objet

                // 3. Création du Mesh
                const material = new THREE.MeshStandardMaterial({ 
                    vertexColors: true, 
                    roughness: 0.5,
                    metalness: 0.1
                });

                if(mesh) scene.remove(mesh);
                mesh = new THREE.Mesh(geometry, material);
                mesh.rotation.x = -Math.PI / 2; // Remet à plat
                mesh.castShadow = true;
                mesh.receiveShadow = true;
                scene.add(mesh);

                // 4. Ajustement Caméra
                const size = geometry.boundingBox.getSize(new THREE.Vector3()).length();
                camera.position.set(size, size, size);
                controls.target.set(0,0,0);
                
                document.getElementById('message').style.display = 'none';
                document.getElementById('info').style.display = 'block';
            };
            reader.readAsArrayBuffer(file);
        }

        function onResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }

        init();
    </script>
</body>
</html>
